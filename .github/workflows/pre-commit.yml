---
name: pre-commit

on:
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Checkout voxel51/aloha-github-workflows
        uses: actions/checkout@v6
        with:
          repository: voxel51/aloha-github-workflows
          ref: main
          token: ${{ secrets.ORG_RO_ALOHA_GITHUB_WORKFLOWS_FG_PAT }}
          path: ./.github/actions/aloha-github-workflows
      - name: debug - list files and mutate action step from GH to local clone
        shell: bash
        run: |
          echo "ls -alh"
          ls -alh

          echo "ls -alh .github/actions"
          ls -alh .github/actions

          echo ""
          echo "ls -alh .github/actions/aloha-github-workflows"
          ls -alh .github/actions/aloha-github-workflows

          echo ""
          echo "ls .github/actions/aloha-github-workflows/.github/"
          ls .github/actions/aloha-github-workflows/.github/

          echo ""
          echo "ls .github/actions/aloha-github-workflows/.github/actions/"
          ls .github/actions/aloha-github-workflows/.github/actions/

          echo ""
          echo "ls .github/actions/aloha-github-workflows/.github/actions/asdf-install-and-cache"
          ls .github/actions/aloha-github-workflows/.github/actions/asdf-install-and-cache

          echo ""
          echo "ls .github/actions/aloha-github-workflows/.github/actions/asdf-install-and-cache/action.yml"
          ls .github/actions/aloha-github-workflows/.github/actions/asdf-install-and-cache/action.yml

          # replace the private repo composite action to be relative from the repo clone
          # the replacement path value may need to be updated.
          sed -i \
            's%voxel51/aloha-github-workflows/.github/actions/generate-version-file@main%./.github/actions/aloha-github-workflows/.github/actions/generate-version-file%' \
            .github/actions/aloha-github-workflows/.github/actions/asdf-install-and-cache/action.yml
      - uses: actions/setup-python@v6.2.0
      - name: Temporary SQLite/LZMA - Install missing libraries
        run: sudo apt install -y libsqlite3-dev libbz2-dev
      - name: Install asdf & tools
        uses: ./.github/actions/aloha-github-workflows/.github/actions/asdf-install-and-cache
      - name: Install helm plugins
        run: make helm-plugins
      - uses: pre-commit/action@v3.0.1
