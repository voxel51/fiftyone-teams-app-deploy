---
# Telemetry overlay. Adds a Redis backend + sidecar containers that observe
# each target service via a shared PID namespace, publishing metrics and
# log events to Redis.
#
# Layered on top of the main compose file, e.g.:
#   docker compose -f compose.yaml -f compose.telemetry.yaml up
#
# Or with delegated operators and/or dedicated plugins:
#   docker compose -f compose.yaml \
#     -f compose.delegated-operators.yaml \
#     -f compose.dedicated-plugins.yaml \
#     -f compose.telemetry.yaml up
#
# For Proxy Server instructions please see
#  https://github.com/voxel51/fiftyone-teams-app-deploy/tree/main/docker#environment-proxies
services:
  # Redis backend for telemetry samples and log streams.
  telemetry-redis:
    image: ${TELEMETRY_REDIS_IMAGE:-redis:7-alpine}
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --dir
      - /data
      - --maxmemory
      - ${TELEMETRY_REDIS_MAXMEMORY:-400mb}
      - --maxmemory-policy
      - allkeys-lru
    restart: always
    volumes:
      - telemetry-redis-data:/data

  # Inject the Redis URL onto the services that read/write telemetry.
  # teams-api serves the /telemetry Sanic blueprint; teams-app serves
  # /api/telemetry/stream + /api/telemetry/logs SSE endpoints.
  fiftyone-app:
    environment:
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}

  teams-api:
    environment:
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}

  teams-app:
    environment:
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}

  # One sidecar per observed service. `pid: "service:<target>"` joins the
  # target's PID namespace so the sidecar can read /proc/<pid>/fd/1 and
  # psutil can see the target's process.

  fiftyone-app-telemetry:
    image: ${TELEMETRY_SIDECAR_IMAGE:-voxel51/telemetry-sidecar:latest}
    pid: "service:fiftyone-app"
    environment:
      POD_NAME: fiftyone-app
      POD_NAMESPACE: ${TELEMETRY_NAMESPACE:-docker}
      SERVICE_TYPE: fiftyone-app
      TARGET_NAME: ${FIFTYONE_APP_TARGET_NAME:-hypercorn}
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
    depends_on:
      - fiftyone-app
      - telemetry-redis
    restart: always

  teams-api-telemetry:
    image: ${TELEMETRY_SIDECAR_IMAGE:-voxel51/telemetry-sidecar:latest}
    pid: "service:teams-api"
    environment:
      POD_NAME: teams-api
      POD_NAMESPACE: ${TELEMETRY_NAMESPACE:-docker}
      SERVICE_TYPE: teams-api
      TARGET_NAME: ${TEAMS_API_TARGET_NAME:-fiftyone.teams.api}
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
    depends_on:
      - teams-api
      - telemetry-redis
    restart: always

volumes:
  telemetry-redis-data:
