---
# For Proxy Server instructions please see
#  https://github.com/voxel51/fiftyone-teams-app-deploy/tree/main/docker#environment-proxies
#
# Telemetry (`telemetry-redis` + per-service sidecars) is enabled by
# default. To opt out, scale the telemetry services to 0 in a
# `compose.override.yaml`, or unset `FIFTYONE_TELEMETRY_REDIS_URL` and
# remove the sidecar services. See docker/docs/configuring-telemetry.md.
services:
  fiftyone-app:
    extends:
      file: ../common-services.yaml
      service: fiftyone-app-common

  teams-api:
    extends:
      file: ../common-services.yaml
      service: teams-api-common

  teams-app:
    extends:
      file: ../common-services.yaml
      service: teams-app-common

  teams-cas:
    environment:
      CAS_URL: ${AUTH0_BASE_URL}
      NEXTAUTH_URL: ${AUTH0_BASE_URL}/cas/api/auth
    extends:
      file: ../common-services.yaml
      service: teams-cas-common

  telemetry-redis:
    extends:
      file: ../common-services.yaml
      service: telemetry-redis-common

  fiftyone-app-telemetry:
    extends:
      file: ../common-services.yaml
      service: fiftyone-app-telemetry-common
    depends_on:
      fiftyone-app:
        condition: service_started
        restart: true
      telemetry-redis:
        condition: service_started

  teams-api-telemetry:
    extends:
      file: ../common-services.yaml
      service: teams-api-telemetry-common
    depends_on:
      teams-api:
        condition: service_started
        restart: true
      telemetry-redis:
        condition: service_started

volumes:
  telemetry-redis-data:
