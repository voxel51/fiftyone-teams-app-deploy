---
# Telemetry overlay for the delegated operators (teams-do) service.
# Use alongside compose.telemetry.yaml and compose.delegated-operators.yaml:
#
#   docker compose -f compose.yaml \
#     -f compose.delegated-operators.yaml \
#     -f compose.telemetry.yaml \
#     -f compose.telemetry.delegated-operators.yaml \
#     up -d
#
# The EXECUTOR_SIDECAR mode watches the teams-do executor for per-operation
# child processes and records per-op metrics back to the delegated_ops
# MongoDB document (via FIFTYONE_DATABASE_URI).
#
# This overlay FORCES `teams-do` replicas to 1 so the sidecar has a
# deterministic 1:1 pairing via the shared PID namespace. docker-compose's
# `pid: "service:<name>"` only joins a single replica's PID namespace,
# so running multiple replicas with a single sidecar would silently miss
# the other replicas. If you need multiple DO workers observed, run one
# teams-do + sidecar pair per worker by defining additional services
# (teams-do-1, teams-do-2, ...), or switch to the helm chart which scales
# the sidecar alongside each pod automatically.
#
# For Proxy Server instructions please see
#  https://github.com/voxel51/fiftyone-teams-app-deploy/tree/main/docker#environment-proxies
services:
  teams-do:
    environment:
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
      TELEMETRY_SOCKET: /tmp/telemetry/agent.sock
    deploy:
      replicas: 1
    volumes:
      - telemetry-socket:/tmp/telemetry

  teams-do-telemetry:
    image: ${TELEMETRY_SIDECAR_IMAGE:-voxel51/telemetry-sidecar:latest}
    pid: "service:teams-do"
    environment:
      POD_NAME: teams-do
      POD_NAMESPACE: ${TELEMETRY_NAMESPACE:-docker}
      SERVICE_TYPE: delegated-operator
      TARGET_NAME: ${TEAMS_DO_TARGET_NAME:-fiftyone delegated}
      EXECUTOR_SIDECAR: "true"
      TELEMETRY_SOCKET: /tmp/telemetry/agent.sock
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
      FIFTYONE_DATABASE_URI: ${FIFTYONE_DATABASE_URI}
      FIFTYONE_DATABASE_NAME: ${FIFTYONE_DATABASE_NAME}
    volumes:
      - telemetry-socket:/tmp/telemetry
    depends_on:
      - teams-do
      - telemetry-redis
    restart: always

volumes:
  telemetry-socket:
