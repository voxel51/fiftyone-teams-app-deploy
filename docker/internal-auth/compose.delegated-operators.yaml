---
# Layered on top of a base compose file (e.g. compose.yaml). The base
# compose file is expected to provide the `telemetry-redis` service.
#
# Each delegated-operator worker shares its PID namespace with a paired
# telemetry sidecar (compose's `pid: "service:<name>"` only joins one
# replica). To observe more than one worker at a time we declare a
# fixed set of slots; slot 1 is always on and slots 2-3 are opt-in via
# cumulative Compose profiles:
#
#   slot 1  teams-do      + teams-do-telemetry       (always on)
#   slot 2  teams-do-2    + teams-do-2-telemetry     (do-2, do-3)
#   slot 3  teams-do-3    + teams-do-3-telemetry     (do-3)
#
# Default (no profile) runs one worker. Selecting `do-N` for N>1 adds
# slots up to N; profiles are nested so `do-3` includes slot 2.
# Activate via `COMPOSE_PROFILES` in `.env`, e.g.
#
#   COMPOSE_PROFILES=do-3
#   docker compose -f compose.yaml -f compose.delegated-operators.yaml up -d
#
# or equivalently with explicit flags:
#
#   docker compose --profile do-3 \
#     -f compose.yaml -f compose.delegated-operators.yaml up -d
#
# This replaces the pre-telemetry `FIFTYONE_DELEGATED_OPERATOR_WORKER_REPLICAS`
# knob, which scaled `teams-do` to N replicas but left N-1 of them
# invisible to the telemetry sidecar. The cap of 3 is a deliberate
# trade-off — for higher worker counts prefer the helm chart. If
# docker compose is required, the slot-2/3 blocks below are templates:
# duplicate them as `teams-do-4` / `teams-do-4-telemetry` etc.,
# bumping the service name, `pid`, `POD_NAME`, `-n teams-do-N`, and
# `telemetry-socket-N` volume on each copy. See
# docker/docs/configuring-telemetry.md for details.
#
# For Proxy Server instructions please see
#  https://github.com/voxel51/fiftyone-teams-app-deploy/tree/main/docker#environment-proxies
services:
  teams-do:
    extends:
      file: ../common-services.yaml
      service: teams-do-common

  teams-do-telemetry:
    extends:
      file: ../common-services.yaml
      service: teams-do-telemetry-common
    depends_on:
      teams-do:
        condition: service_started
        restart: true
      telemetry-redis:
        condition: service_started

  # Slot 2 — included by the `do-2` and `do-3` profiles. Defined inline
  # (rather than extending teams-do-common) so it can own its own
  # executor-socket named volume; named volumes are shared by their
  # volume name, so reusing `telemetry-socket` across slots would
  # clobber the socket. `-n teams-do-2` registers this worker as a
  # distinct orchestrator name so it surfaces separately in the
  # Settings → Metrics UI.
  teams-do-2:
    image: voxel51/fiftyone-teams-cv-full:v2.19.0
    profiles: ["do-2", "do-3"]
    deploy:
      replicas: 1
    command: >
      /bin/sh -c "fiftyone delegated launch -t remote -m -n teams-do-2"
    environment:
      API_URL: ${API_URL}
      FIFTYONE_DATABASE_ADMIN: false
      FIFTYONE_DATABASE_NAME: ${FIFTYONE_DATABASE_NAME}
      FIFTYONE_DATABASE_URI: ${FIFTYONE_DATABASE_URI}
      FIFTYONE_ENCRYPTION_KEY: ${FIFTYONE_ENCRYPTION_KEY}
      FIFTYONE_INTERNAL_SERVICE: true
      FIFTYONE_MEDIA_CACHE_SIZE_BYTES: -1
      FIFTYONE_PLUGINS_DIR: /opt/plugins
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
      TELEMETRY_SOCKET: /tmp/telemetry/agent.sock
    restart: always
    volumes:
      - plugins-vol:/opt/plugins:ro
      - telemetry-socket-2:/tmp/telemetry

  teams-do-2-telemetry:
    image: voxel51/telemetry-sidecar:v2.19.0
    profiles: ["do-2", "do-3"]
    pid: "service:teams-do-2"
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    environment:
      POD_NAME: teams-do-2
      POD_NAMESPACE: ${TELEMETRY_NAMESPACE:-docker}
      SERVICE_TYPE: delegated-operator
      TARGET_NAME: ${TEAMS_DO_TARGET_NAME:-fiftyone delegated}
      EXECUTOR_SIDECAR: "true"
      TELEMETRY_SOCKET: /tmp/telemetry/agent.sock
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
      FIFTYONE_DATABASE_URI: ${FIFTYONE_DATABASE_URI}
      FIFTYONE_DATABASE_NAME: ${FIFTYONE_DATABASE_NAME}
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 512M
    volumes:
      - telemetry-socket-2:/tmp/telemetry
    depends_on:
      teams-do-2:
        condition: service_started
        restart: true
      telemetry-redis:
        condition: service_started
    restart: always

  # Slot 3 — included by the `do-3` profile. Mirror of slot 2 with its
  # own socket volume and orchestrator name.
  teams-do-3:
    image: voxel51/fiftyone-teams-cv-full:v2.19.0
    profiles: ["do-3"]
    deploy:
      replicas: 1
    command: >
      /bin/sh -c "fiftyone delegated launch -t remote -m -n teams-do-3"
    environment:
      API_URL: ${API_URL}
      FIFTYONE_DATABASE_ADMIN: false
      FIFTYONE_DATABASE_NAME: ${FIFTYONE_DATABASE_NAME}
      FIFTYONE_DATABASE_URI: ${FIFTYONE_DATABASE_URI}
      FIFTYONE_ENCRYPTION_KEY: ${FIFTYONE_ENCRYPTION_KEY}
      FIFTYONE_INTERNAL_SERVICE: true
      FIFTYONE_MEDIA_CACHE_SIZE_BYTES: -1
      FIFTYONE_PLUGINS_DIR: /opt/plugins
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
      TELEMETRY_SOCKET: /tmp/telemetry/agent.sock
    restart: always
    volumes:
      - plugins-vol:/opt/plugins:ro
      - telemetry-socket-3:/tmp/telemetry

  teams-do-3-telemetry:
    image: voxel51/telemetry-sidecar:v2.19.0
    profiles: ["do-3"]
    pid: "service:teams-do-3"
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    environment:
      POD_NAME: teams-do-3
      POD_NAMESPACE: ${TELEMETRY_NAMESPACE:-docker}
      SERVICE_TYPE: delegated-operator
      TARGET_NAME: ${TEAMS_DO_TARGET_NAME:-fiftyone delegated}
      EXECUTOR_SIDECAR: "true"
      TELEMETRY_SOCKET: /tmp/telemetry/agent.sock
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
      FIFTYONE_DATABASE_URI: ${FIFTYONE_DATABASE_URI}
      FIFTYONE_DATABASE_NAME: ${FIFTYONE_DATABASE_NAME}
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 512M
    volumes:
      - telemetry-socket-3:/tmp/telemetry
    depends_on:
      teams-do-3:
        condition: service_started
        restart: true
      telemetry-redis:
        condition: service_started
    restart: always

volumes:
  plugins-vol:
  telemetry-socket:
  telemetry-socket-2:
  telemetry-socket-3:
