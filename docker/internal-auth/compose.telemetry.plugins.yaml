---
# Telemetry overlay for the dedicated teams-plugins service. The sidecar
# shares the target's PID namespace via `pid: "service:teams-plugins"`.
#
# Layered after compose.dedicated-plugins.yaml + compose.telemetry.yaml:
#
#   docker compose -f compose.yaml \
#     -f compose.dedicated-plugins.yaml \
#     -f compose.telemetry.yaml \
#     -f compose.telemetry.plugins.yaml \
#     up -d
#
# For Proxy Server instructions please see
#  https://github.com/voxel51/fiftyone-teams-app-deploy/tree/main/docker#environment-proxies
services:
  teams-plugins:
    environment:
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}

  teams-plugins-telemetry:
    image: ${TELEMETRY_SIDECAR_IMAGE:-voxel51/telemetry-sidecar:latest}
    pid: "service:teams-plugins"
    cap_add:
      - SYS_PTRACE
    environment:
      POD_NAME: teams-plugins
      POD_NAMESPACE: ${TELEMETRY_NAMESPACE:-docker}
      SERVICE_TYPE: teams-plugins
      TARGET_NAME: ${TEAMS_PLUGINS_TARGET_NAME:-hypercorn}
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
    depends_on:
      teams-plugins:
        condition: service_started
        restart: true
      telemetry-redis:
        condition: service_started
    restart: always
