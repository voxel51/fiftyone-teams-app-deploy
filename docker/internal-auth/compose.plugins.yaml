---
# For Proxy Server instructions please see
#  https://github.com/voxel51/fiftyone-teams-app-deploy/tree/main/docker#environment-proxies
services:
  fiftyone-app:
    environment:
      FIFTYONE_PLUGINS_DIR: /opt/plugins
    extends:
      file: ../common-services.yaml
      service: fiftyone-app-common
    volumes:
      - plugins-vol:/opt/plugins:ro

  teams-api:
    environment:
      FIFTYONE_PLUGINS_DIR: /opt/plugins
    extends:
      file: ../common-services.yaml
      service: teams-api-common
    volumes:
      - plugins-vol:/opt/plugins

  teams-app:
    extends:
      file: ../common-services.yaml
      service: teams-app-common

  teams-cas:
    environment:
      CAS_URL: ${BASE_URL}
      NEXTAUTH_URL: ${BASE_URL}/cas/api/auth
      FIFTYONE_AUTH_MODE: internal
    extends:
      file: ../common-services.yaml
      service: teams-cas-common

  telemetry-redis:
    image: ${TELEMETRY_REDIS_IMAGE:-redis:7-alpine}
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --dir
      - /data
      - --maxmemory
      - ${TELEMETRY_REDIS_MAXMEMORY:-400mb}
      - --maxmemory-policy
      - ${TELEMETRY_REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 256M
    volumes:
      - telemetry-redis-data:/data

  fiftyone-app-telemetry:
    image: ${TELEMETRY_SIDECAR_IMAGE:-voxel51/telemetry-sidecar:v0.1.62}
    pid: "service:fiftyone-app"
    cap_add:
      - SYS_PTRACE
    environment:
      POD_NAME: fiftyone-app
      POD_NAMESPACE: ${TELEMETRY_NAMESPACE:-docker}
      SERVICE_TYPE: fiftyone-app
      TARGET_NAME: ${FIFTYONE_APP_TARGET_NAME:-hypercorn}
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 512M
    depends_on:
      fiftyone-app:
        condition: service_started
        restart: true
      telemetry-redis:
        condition: service_started
    restart: always

  teams-api-telemetry:
    image: ${TELEMETRY_SIDECAR_IMAGE:-voxel51/telemetry-sidecar:v0.1.62}
    pid: "service:teams-api"
    cap_add:
      - SYS_PTRACE
    environment:
      POD_NAME: teams-api
      POD_NAMESPACE: ${TELEMETRY_NAMESPACE:-docker}
      SERVICE_TYPE: teams-api
      TARGET_NAME: ${TEAMS_API_TARGET_NAME:-fiftyone-teams-api}
      FIFTYONE_TELEMETRY_REDIS_URL: ${FIFTYONE_TELEMETRY_REDIS_URL:-redis://telemetry-redis:6379}
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 512M
    depends_on:
      teams-api:
        condition: service_started
        restart: true
      telemetry-redis:
        condition: service_started
    restart: always

volumes:
  plugins-vol:
  telemetry-redis-data:
