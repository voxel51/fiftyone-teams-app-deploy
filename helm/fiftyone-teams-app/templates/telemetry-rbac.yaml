{{- if .Values.telemetry }}
{{- if .Values.telemetry.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fiftyone-teams-app.fullname" . }}-telemetry-logs
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fiftyone-teams-app.commonLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fiftyone-teams-app.fullname" . }}-telemetry-logs
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "fiftyone-teams-app.commonLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fiftyone-teams-app.fullname" . }}-telemetry-logs
subjects:
  - kind: ServiceAccount
    name: {{ include "fiftyone-teams-app.serviceAccountName" . }}
    namespace: {{ .Values.namespace.name }}
  {{- if .Values.apiSettings.rbac.create }}
  - kind: ServiceAccount
    name: {{ include "teams-api-rbac.service-account-name" . }}
    namespace: {{ .Values.namespace.name }}
  {{- end }}
{{- end }}
{{- end }}
