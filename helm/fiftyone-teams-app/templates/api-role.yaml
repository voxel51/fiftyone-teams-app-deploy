{{- if .Values.apiSettings.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "teams-api-rbac.role-name" . }}
  namespace: {{ .Values.namespace.name }}
  {{- with .Values.apiSettings.rbac.role.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "teams-api-rbac.role-labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "update", "delete"]
  {{- /* The kubernetes-service broker runs inside teams-api and
         provisions a bare Pod plus a ClusterIP Service per service task
         (and deletes them on stop). */}}
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
{{- end }}
