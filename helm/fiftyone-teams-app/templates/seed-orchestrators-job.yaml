{{- $orchestratorsJson := include "delegated-operator-templates.seed-orchestrators" . -}}
{{- if ne $orchestratorsJson "[]" -}}
# Seeds the deployment's orchestrator registrations in Mongo, so they are
# versioned in values instead of hand-created. The registrations are derived
# from the `delegatedOperatorJobTemplates.[jobs|services]` entries that
# contain `registerOrchestrator=true`. See the script in
# `../files/seed_orchestrators.py`.
#
# Uses Helm hooks so it works with ArgoCD (which
# maps post-install/post-upgrade to PostSync).
# Connects directly to Mongo with the deployment's existing teams secrets.
{{- /* The script needs pymongo, so we can use the teams-api image. */}}
{{- $image := .Values.apiSettings.image }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-seed-orchestrators" (include "fiftyone-teams-app.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Values.namespace.name }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "fiftyone-teams-app.commonLabels" . | nindent 4 }}
    app.voxel51.com/component: orchestrator-seeding
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "fiftyone-teams-app.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* The pod runs the teams-api image, so it follows the api pod's
             security attributes. */}}
      {{- with .Values.apiSettings.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seed-orchestrators
          image: "{{ $image.repository }}:{{ $image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ $image.pullPolicy | default "Always" }}
          env:
            - name: FIFTYONE_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: mongodbConnectionString
            - name: FIFTYONE_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: fiftyoneDatabaseName
            - name: ORCHESTRATORS
              value: |-
                {{- $orchestratorsJson | nindent 16 }}
          resources:
            limits:
              cpu: 250m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmpdir
          command: [python, -c]
          args:
            - |
{{ .Files.Get "files/seed_orchestrators.py" | indent 14 }}
      volumes:
        - emptyDir:
            sizeLimit: 100Mi
          name: tmpdir
{{- end }}
