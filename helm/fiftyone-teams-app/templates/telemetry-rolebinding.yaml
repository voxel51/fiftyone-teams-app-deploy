{{- if .Values.telemetry.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "telemetry.role.name" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "telemetry.role.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "telemetry.role.name" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "telemetry.role.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "telemetry.role.name" . }}
subjects:
{{- range .Values.telemetry.serviceAccounts | default (list "default") }}
  - kind: ServiceAccount
    name: {{ . }}
    namespace: {{ $.Values.namespace.name }}
{{- end }}
{{- end }}
