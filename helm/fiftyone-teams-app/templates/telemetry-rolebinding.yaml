{{- if and .Values.telemetry.enabled .Values.telemetry.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "telemetry.role.name" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "telemetry.role.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "telemetry.role.name" . }}
subjects:
  {{- include "telemetry.role.subjects" . | nindent 2 }}
{{- end }}
